<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkChennai — Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-glow"></div>

  <div class="auth-wrapper">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="logo-mark">🅿</div>
        <h1>Park<span style="color:var(--accent)">Chennai</span></h1>
        <p>Create your account</p>
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Arjun Kumar" autocomplete="name" />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password" />
      </div>

      <button class="btn btn-primary" id="signup-btn" onclick="handleSignup()">
        Create Account
      </button>

      <div class="auth-divider">
        Already have an account? <a href="index.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignup();
    });

    async function handleSignup() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('signup-btn');

      if (!name || !email || !password) {
        showToast('Please fill in all fields.', 'error');
        return;
      }
      if (password.length < 6) {
        showToast('Password must be at least 6 characters.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const data = await API.post('/auth/signup', { name, email, password });
        Auth.setSession(data.token, data.user);
        showToast('Account created! Redirecting…', 'success', 1500);
        setTimeout(() => window.location.href = '/dashboard.html', 900);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
