<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkChennai — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-glow"></div>

  <div class="auth-wrapper">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="logo-mark">🅿</div>
        <h1>Park<span style="color:var(--accent)">Chennai</span></h1>
        <p>Smart parking for the city</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">
        Sign In
      </button>

      <div class="auth-divider">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');

      if (!email || !password) {
        showToast('Please fill in all fields.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const data = await API.post('/auth/login', { email, password });
        Auth.setSession(data.token, data.user);
        showToast(`Welcome back, ${data.user.name}!`, 'success', 1500);
        setTimeout(() => window.location.href = '/dashboard.html', 800);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
