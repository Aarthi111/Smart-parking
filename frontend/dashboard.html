<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkChennai — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-logo" href="dashboard.html">🅿 Park<span>Chennai</span></a>
    <ul class="nav-links">
      <li><a href="dashboard.html" class="active">Locations</a></li>
      <li><a href="history.html">My Bookings</a></li>
      <li><a href="#" onclick="logout(); return false;" class="btn-nav">Logout</a></li>
    </ul>
    <div class="nav-user">Hi, <strong id="nav-user-name"></strong></div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Find <em>Parking</em> in Chennai</h1>
      <p>Click any location to view slots and book instantly</p>
    </div>

    <div id="cards-container">
      <div class="loader"></div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    Auth.requireAuth();
    renderNavUser();

    const ICONS = ['🏪','🚉','🛍️','🏖️','🛒','🚇','✈️','🌊','🏙️','💻'];

    async function loadLocations() {
      try {
        const locations = await API.get('/locations');
        renderCards(locations);
      } catch (err) {
        showToast(err.message, 'error');
        document.getElementById('cards-container').innerHTML =
          `<div class="empty-state"><div class="icon">⚠️</div><h3>Failed to load locations</h3><p>${err.message}</p></div>`;
      }
    }

    function getBadge(free, total) {
      const ratio = free / total;
      if (free === 0)    return '<span class="availability-badge full">Full</span>';
      if (ratio <= 0.25) return '<span class="availability-badge limited">Limited</span>';
      return '<span class="availability-badge available">Available</span>';
    }

    function renderCards(locations) {
      const container = document.getElementById('cards-container');
      if (!locations.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🅿</div><h3>No locations found</h3></div>';
        return;
      }

      container.innerHTML = `<div class="cards-grid">${locations.map((loc, i) => `
        <div class="location-card" onclick="window.location.href='location.html?id=${loc.id}'">
          <div class="card-icon">${ICONS[i] || '🅿'}</div>
          <div class="card-name">${loc.name}</div>
          <div class="card-address">📍 ${loc.address}</div>
          <div class="card-stats">
            <div class="stat free">
              <span class="stat-value">${loc.free_slots}</span>
              <span class="stat-label">Free</span>
            </div>
            <div class="stat occupied">
              <span class="stat-value">${loc.occupied_slots}</span>
              <span class="stat-label">Occupied</span>
            </div>
            <div class="stat total">
              <span class="stat-value">${loc.total_slots}</span>
              <span class="stat-label">Total</span>
            </div>
          </div>
          <div class="card-footer">
            <div class="card-price">₹${parseFloat(loc.price_per_hour).toFixed(0)} <span>/ hour</span></div>
            ${getBadge(loc.free_slots, loc.total_slots)}
          </div>
        </div>
      `).join('')}</div>`;
    }

    loadLocations();
  </script>
</body>
</html>
